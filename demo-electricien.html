<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Voltaris Électricité — Électricien à Borgo, Bastia & Haute-Corse</title>
<meta name="description" content="Voltaris Électricité intervient à Borgo, Bastia, Biguglia et Lucciana pour le dépannage électrique, la rénovation, les tableaux électriques, l’éclairage, les bornes de recharge, l’interphonie et la sécurité." />
<meta name="robots" content="index, follow" />
<meta name="author" content="Voltaris Électricité" />
<meta name="theme-color" content="#0a3f8f" />

<style>
:root{
--blue:#0a3f8f;
--blue-dark:#062e69;
--blue-deep:#051d42;
--cyan:#2dd4ff;
--yellow:#ffd34d;
--bg:#f4f7fb;
--bg-soft:#edf3fa;
--white:#ffffff;
--text:#122033;
--muted:#637186;
--line:#d9e1ea;
--shadow:0 18px 48px rgba(5,29,66,.11);
--shadow-strong:0 26px 70px rgba(5,29,66,.18);
--radius:24px;
--max:1180px;
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
margin:0;
font-family:Inter,Arial,Helvetica,sans-serif;
color:var(--text);
background:linear-gradient(180deg,#f8fbff 0%,#eef3f9 100%);
line-height:1.55;
overflow-x:hidden;
-webkit-font-smoothing:antialiased;
}

a{text-decoration:none;color:inherit}
h1,h2,h3,p{margin:0}
h1,h2,h3{letter-spacing:-.035em}
h1{font-size:clamp(38px,6vw,68px);line-height:1.02}
h2{font-size:clamp(28px,4vw,46px);line-height:1.08}
h3{font-size:22px;line-height:1.2}
.container{width:min(var(--max),calc(100% - 28px));margin:0 auto}
.section{padding:82px 0}
.section-tight{padding:58px 0}
.muted{color:var(--muted)}
.eyebrow{
display:inline-block;
margin-bottom:14px;
font-size:12px;
text-transform:uppercase;
letter-spacing:.14em;
font-weight:900;
color:var(--blue);
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:15px 22px;
border-radius:999px;
font-weight:950;
transition:.25s ease;
border:2px solid transparent;
cursor:pointer;
text-align:center;
position:relative;
overflow:hidden;
}

.btn:hover{transform:translateY(-2px)}
.btn-primary{
background:linear-gradient(135deg,#ffe277 0%,var(--yellow) 100%);
color:#111827;
box-shadow:0 15px 32px rgba(255,211,77,.28);
}
.btn-blue{
background:linear-gradient(135deg,var(--blue),var(--blue-dark));
color:#fff;
box-shadow:0 15px 32px rgba(10,63,143,.24);
}
.btn-outline{
background:rgba(255,255,255,.08);
border-color:rgba(255,255,255,.30);
color:#fff;
}
.btn-light{
background:#fff;
color:var(--blue);
border:1px solid var(--line);
}
.btn-light:hover{box-shadow:var(--shadow)}

.top-strip{
background:linear-gradient(90deg,var(--blue-deep),var(--blue),var(--blue-dark));
color:#fff;
text-align:center;
padding:10px 14px;
font-size:14px;
font-weight:900;
box-shadow:0 8px 24px rgba(5,29,66,.12);
}

.top-strip a{text-decoration:underline}

.topbar{
position:sticky;
top:0;
z-index:50;
background:rgba(255,255,255,.91);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(5,29,66,.08);
box-shadow:0 10px 30px rgba(5,29,66,.06);
}

.nav{
min-height:82px;
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
}

.brand{
display:flex;
align-items:center;
gap:14px;
min-width:0;
}

.brand-mark{
width:66px;
height:66px;
border-radius:20px;
background:linear-gradient(135deg,var(--blue),var(--blue-dark));
display:flex;
align-items:center;
justify-content:center;
color:var(--yellow);
font-size:28px;
font-weight:950;
box-shadow:0 16px 34px rgba(10,63,143,.22);
flex-shrink:0;
}

.brand strong{
display:block;
font-size:22px;
color:var(--blue-dark);
line-height:1.04;
}

.brand span{
display:block;
font-size:12px;
color:var(--muted);
text-transform:uppercase;
letter-spacing:.12em;
margin-top:4px;
font-weight:800;
}

.menu{
display:flex;
align-items:center;
gap:20px;
color:#304055;
font-weight:850;
}

.menu a:hover{color:var(--blue)}

.hero{
position:relative;
overflow:hidden;
color:#fff;
background:
radial-gradient(circle at 82% 8%,rgba(255,211,77,.24),transparent 28%),
radial-gradient(circle at 8% 18%,rgba(255,255,255,.12),transparent 24%),
linear-gradient(135deg,#062e69 0%,#0a3f8f 48%,#051d42 100%);
padding:94px 0 112px;
}

.hero::after{
content:"";
position:absolute;
width:420px;
height:420px;
border-radius:50%;
right:-160px;
bottom:-180px;
background:rgba(255,211,77,.16);
filter:blur(18px);
pointer-events:none;
}

.hero-grid{
position:relative;
display:grid;
grid-template-columns:1.05fr .95fr;
gap:42px;
align-items:center;
z-index:2;
}

.hero-copy p{
margin-top:22px;
color:#e8f1fb;
font-size:18px;
max-width:690px;
font-weight:500;
}

.hero-actions{
display:flex;
gap:14px;
flex-wrap:wrap;
margin-top:28px;
}

.hero-points{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:20px;
}

.hero-point{
padding:10px 14px;
border-radius:999px;
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.12);
color:#eff6ff;
font-size:14px;
font-weight:850;
}

.hero-card{
padding:18px;
border-radius:30px;
background:rgba(255,255,255,.09);
border:1px solid rgba(255,255,255,.14);
box-shadow:var(--shadow-strong);
}

.hero-panel{
min-height:490px;
border-radius:26px;
overflow:hidden;
position:relative;
background:
linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.04)),
linear-gradient(135deg,#0b2448,#061a34);
padding:24px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.hero-panel::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at 20% 18%,rgba(45,212,255,.25),transparent 25%),
radial-gradient(circle at 80% 8%,rgba(255,211,77,.22),transparent 28%);
pointer-events:none;
}

.panel-top,.panel-bottom{position:relative;z-index:2}

.panel-status{
display:flex;
justify-content:space-between;
align-items:center;
gap:14px;
}

.panel-status span{
padding:10px 13px;
border-radius:999px;
background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.12);
font-size:13px;
font-weight:900;
color:#fff;
}

.panel-card{
margin-top:22px;
background:rgba(255,255,255,.92);
color:var(--text);
border-radius:24px;
padding:24px;
box-shadow:0 18px 46px rgba(0,0,0,.18);
}

.panel-card h3{font-size:24px;color:var(--blue-dark)}
.panel-card p{margin-top:10px;color:var(--muted)}

.panel-list{
display:grid;
gap:12px;
margin-top:18px;
}

.panel-list div{
display:flex;
justify-content:space-between;
gap:10px;
background:#f3f7fc;
border:1px solid #dce7f2;
padding:13px 14px;
border-radius:16px;
font-weight:900;
}

.panel-list span{color:var(--muted);font-weight:800}

.panel-bottom{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.panel-mini{
background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.12);
border-radius:18px;
padding:16px;
}

.panel-mini strong{
display:block;
font-size:22px;
color:var(--yellow);
}

.panel-mini span{
font-size:13px;
color:#dce9f8;
font-weight:800;
}

.quick-bar{
margin-top:-42px;
position:relative;
z-index:3;
}

.quick-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
}

.quick{
background:rgba(255,255,255,.96);
border:1px solid rgba(217,225,234,.95);
border-radius:26px;
padding:24px;
box-shadow:var(--shadow);
backdrop-filter:blur(10px);
transition:.25s ease;
}

.quick:hover{
transform:translateY(-4px);
box-shadow:var(--shadow-strong);
border-color:rgba(10,63,143,.18);
}

.quick strong{
display:block;
color:var(--blue-dark);
font-size:20px;
margin-bottom:6px;
}

.quick span{
color:var(--muted);
font-weight:750;
font-size:15px;
}

.alert-section{
background:#fff7d9;
border-top:1px solid #f4df96;
border-bottom:1px solid #f4df96;
}

.alert-box{
text-align:center;
max-width:880px;
margin:0 auto;
}

.alert-box p{
margin-top:12px;
color:#5f4b18;
font-weight:650;
}

.alert-actions{
margin-top:22px;
display:flex;
justify-content:center;
gap:14px;
flex-wrap:wrap;
}

.grid-3{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-top:30px;
}

.grid-2{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
margin-top:30px;
}

.card{
background:rgba(255,255,255,.96);
border:1px solid rgba(217,225,234,.95);
border-radius:26px;
padding:28px;
box-shadow:var(--shadow);
transition:.25s ease;
}

.card:hover{
transform:translateY(-4px);
box-shadow:var(--shadow-strong);
border-color:rgba(10,63,143,.18);
}

.icon{
width:60px;
height:60px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,rgba(10,63,143,.10),rgba(255,211,77,.14));
color:var(--blue);
font-size:24px;
margin-bottom:18px;
box-shadow:inset 0 0 0 1px rgba(10,63,143,.06);
}

.card p{
color:var(--muted);
margin-top:10px;
}

.mini-list{
list-style:none;
padding:0;
margin:16px 0 0;
display:grid;
gap:8px;
color:var(--muted);
font-weight:750;
}

.mini-list li::before{
content:"✓ ";
color:var(--blue);
font-weight:950;
}

.band{
background:
radial-gradient(circle at 85% 10%,rgba(255,211,77,.18),transparent 28%),
linear-gradient(135deg,#051d42 0%,#0a3f8f 58%,#061b3b 100%);
color:#fff;
}

.band .eyebrow{color:#ffd653}

.reasons{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-top:30px;
}

.reason{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.14);
border-radius:24px;
padding:24px;
backdrop-filter:blur(10px);
transition:.25s ease;
}

.reason:hover{
transform:translateY(-3px);
background:rgba(255,255,255,.11);
}

.reason strong{
display:block;
color:#fff;
margin-bottom:8px;
font-size:18px;
}

.reason p{
color:#d6e5f5;
}

.cta{
display:grid;
grid-template-columns:1.1fr .9fr;
gap:24px;
align-items:center;
padding:44px;
border-radius:32px;
background:
radial-gradient(circle at 90% 0%,rgba(255,211,77,.20),transparent 30%),
linear-gradient(135deg,#0a3f8f 0%,#062e69 100%);
color:#fff;
box-shadow:var(--shadow-strong);
overflow:hidden;
position:relative;
}

.cta p{
color:#deebf8;
margin-top:14px;
}

.cta-actions{
display:flex;
gap:14px;
flex-wrap:wrap;
}

.intervention-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-top:32px;
}

.intervention{
background:linear-gradient(180deg,#ffffff 0%,#f7fbff 100%);
border:1px solid var(--line);
border-radius:28px;
padding:30px;
box-shadow:var(--shadow);
transition:.25s ease;
position:relative;
overflow:hidden;
}

.intervention::before{
content:"";
position:absolute;
width:120px;
height:120px;
border-radius:50%;
right:-54px;
top:-54px;
background:rgba(10,63,143,.08);
}

.intervention:hover{
transform:translateY(-4px);
box-shadow:var(--shadow-strong);
}

.intervention-tag{
display:inline-flex;
padding:8px 12px;
border-radius:999px;
background:#eaf3ff;
color:var(--blue);
font-size:13px;
font-weight:950;
margin-bottom:14px;
}

.intervention p{
color:var(--muted);
margin-top:10px;
}

.intervention ul{
list-style:none;
padding:0;
margin:18px 0 0;
display:grid;
gap:9px;
color:#425269;
font-weight:800;
}

.intervention li::before{
content:"✓ ";
color:var(--blue);
font-weight:950;
}

.process-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-top:30px;
}

.step{
background:#fff;
border:1px solid var(--line);
border-radius:26px;
padding:28px;
box-shadow:var(--shadow);
}

.step span{
width:56px;
height:56px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
background:#eaf3ff;
color:var(--blue);
font-weight:950;
margin-bottom:16px;
}

.step p{
color:var(--muted);
margin-top:10px;
}

.zone-grid{
display:grid;
grid-template-columns:.9fr 1.1fr;
gap:20px;
margin-top:30px;
}

.zone-card{
background:#fff;
border:1px solid var(--line);
border-radius:28px;
padding:30px;
box-shadow:var(--shadow);
}

.zone-tags{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:18px;
}

.zone-tags span{
padding:10px 13px;
border-radius:999px;
background:#eaf3ff;
color:var(--blue);
font-weight:900;
}

.map-box{
min-height:340px;
border-radius:28px;
background:
linear-gradient(135deg,rgba(10,63,143,.88),rgba(6,46,105,.90)),
linear-gradient(135deg,#eaf3ff,#ffffff);
border:1px solid rgba(255,255,255,.4);
box-shadow:var(--shadow);
display:flex;
align-items:center;
justify-content:center;
padding:28px;
color:#fff;
text-align:center;
}

.map-box strong{
display:block;
font-size:28px;
margin-bottom:10px;
}

.map-box p{
color:#dbeafe;
}

.reviews{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-top:30px;
}

.review{
background:#fff;
border:1px solid var(--line);
border-radius:26px;
padding:28px;
box-shadow:var(--shadow);
}

.stars{
color:#f59e0b;
font-size:18px;
margin-bottom:12px;
}

.review p{
color:var(--muted);
}

.review strong{
display:block;
margin-top:18px;
color:var(--blue-dark);
}

.review span{
font-size:14px;
color:var(--muted);
font-weight:800;
}

.contact-grid{
display:grid;
grid-template-columns:.9fr 1.1fr;
gap:20px;
margin-top:30px;
}

.info-list{
display:grid;
gap:14px;
}

.info{
background:#fff;
border:1px solid var(--line);
border-radius:20px;
padding:18px 20px;
box-shadow:var(--shadow);
}

.info strong{
display:block;
color:var(--blue-dark);
margin-bottom:6px;
}

.info span,.info a{
color:var(--muted);
font-weight:750;
}

.contact-card{
background:#fff;
border:1px solid var(--line);
border-radius:28px;
padding:30px;
box-shadow:var(--shadow-strong);
}

.form-note{
font-size:14px;
font-weight:900;
color:var(--blue-dark);
background:#f3f8ff;
border:1px solid #d9e9ff;
padding:12px 14px;
border-radius:12px;
margin-bottom:16px;
}

form{
display:grid;
gap:14px;
}

input,textarea,select{
width:100%;
border:1px solid #d3dae3;
background:#fafbfc;
border-radius:14px;
padding:14px 16px;
font:inherit;
color:var(--text);
}

input:focus,textarea:focus,select:focus{
outline:none;
border-color:rgba(10,63,143,.55);
box-shadow:0 0 0 4px rgba(10,63,143,.10);
background:#fff;
}

textarea{
min-height:150px;
resize:vertical;
}

.faq-list{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-top:30px;
}

.faq-card{
background:#fff;
border:1px solid var(--line);
border-radius:22px;
padding:24px;
box-shadow:var(--shadow);
}

.faq-card p{
margin-top:10px;
color:var(--muted);
}

.legal-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-top:30px;
}

.legal-card{
background:#fff;
border:1px solid var(--line);
border-radius:22px;
padding:22px;
box-shadow:var(--shadow);
}

.legal-card h3{
font-size:19px;
}

.legal-card p{
color:var(--muted);
margin-top:10px;
font-size:14px;
}

.footer{
background:linear-gradient(135deg,#081827 0%,#0f1724 58%,#061f3f 100%);
color:#d8e0ea;
padding:56px 0 94px;
}

.footer-grid{
display
